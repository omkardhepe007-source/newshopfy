version: '3.8'

# ============================================================
# ShopEasy Docker Compose
# Reads DB credentials from .env file (never commit .env!)
# Create a .env file in this directory with your actual values
# See .env.example for the required variables
# ============================================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopeasy-backend
    restart: unless-stopped
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shopeasy-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
