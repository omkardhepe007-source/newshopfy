# ===========================
# Production Profile (Render)
# All values come from environment variables set in Render dashboard
# ===========================

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shopeasy}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

app.jwt.secret=${APP_JWT_SECRET:ShopEasySecretKey2024VeryLongSecretKeyForJWTSigning12345}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
