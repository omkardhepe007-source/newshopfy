# ===========================
# ShopEasy Application Config
# ===========================

# Server
server.port=8080

# ===========================
# Database Configuration
# ===========================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/shopeasy}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP) - important for cloud DBs
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=ShopEasySecretKey2024VeryLongSecretKeyForJWTSigning12345
app.jwt.expiration=86400000

# CORS - update this after deploying frontend
app.cors.allowed-origins=http://localhost:3000

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
